name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /var/www/TC_LLM_Generator-BE-PROD
          git pull origin main

      - name: Build and restart Docker
        run: |
          cd /var/www/TC_LLM_Generator-BE-PROD
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Fix permissions
        run: |
          sudo chown -R github-runner:github-runner /var/www/TC_LLM_Generator-BE-PROD

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost:8088/actuator/health || curl -f http://localhost:8088/ || echo "App is up"
