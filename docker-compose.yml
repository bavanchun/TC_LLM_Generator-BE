  redis:
    image: redis:8.6.1
    container_name: redis-signup-cache
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data_vol:/data
    networks:
      - testcase_llm_generator_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tc-llm-generator-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 8080:8080
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - testcase_llm_generator_net

volumes:
  pgdata_vol:
  redis_data_vol:

networks:
  testcase_llm_generator_net:
    driver: bridge
