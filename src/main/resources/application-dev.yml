jwt:
  secret: ${JWT_SECRET_KEY}
  expiration-accessToken: ${ACCESS_TOKEN_EXPIRE}
  expiration-refreshToken: ${REFRESH_TOKEN_EXPIRE}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  backend-url: ${APP_BACKEND_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  frontend-urls: ${APP_FRONTEND_URLS:http://localhost:3000}
  mail-from: ${MAIL_FROM:noreply@example.com}

runpod:
  endpoint-url: ${RUNPOD_ENDPOINT_URL:https://api.runpod.ai/v2/qzz8zoqdd2mmfk/openai/v1}
  api-key: ${API_KEY_RUNPOD}
  model: qwen/qwen2.5-7b-instruct-awq
