jwt:
  secret: ${JWT_SECRET_KEY}
  expiration-accessToken: ${ACCESS_TOKEN_EXPIRE}
  expiration-refreshToken: ${REFRESH_TOKEN_EXPIRE}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  backend-url: ${APP_BACKEND_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  frontend-urls: ${APP_FRONTEND_URLS:http://localhost:3000}
  mail-from: ${MAIL_FROM:noreply@example.com}

runpod:
  endpoint-url: ${RUNPOD_ENDPOINT_URL:https://api.runpod.ai/v2/qzz8zoqdd2mmfk/openai/v1}
  api-key: ${API_KEY_RUNPOD}
  model: qwen/qwen2.5-7b-instruct-awq

# ============================================
# Observability: Actuator, Metrics, Tracing
# ============================================
management:
  server:
    # Dedicated internal port — NOT exposed to the internet.
    # Grafana Alloy scrapes this port from within the Docker network.
    port: 8081

  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true

  metrics:
    tags:
      # Common labels attached to every metric for filtering in Grafana
      application: ${spring.application.name}
      environment: ${SPRING_ENV:local}
    distribution:
      # Histogram buckets for HTTP latency percentiles (p50/p95/p99)
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms, 250ms, 500ms, 1s, 2s, 5s

  tracing:
    # Controlled via env var: 0.0 locally (no traces), 1.0 in Docker with Alloy
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}

  otlp:
    tracing:
      # Alloy OTLP HTTP receiver. Falls back to localhost for local dev (fails silently).
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
